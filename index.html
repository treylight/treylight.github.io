<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trey Li</title>
  <style>
    :root {
      --fg: #111;
      --muted: #666;
      --bg: #fff;
      --line: #d8d8d8;
    }

    html, body {
      height: 100%;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      overflow: hidden;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      pointer-events: none;
    }

    .wrap {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      padding: 18vh 24px 0;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    h1 {
      margin: 0 0 0.35rem 0;
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    p {
      margin: 0.2rem 0;
      font-size: 1rem;
      line-height: 1.5;
    }

    .field {
      color: var(--muted);
      margin-top: 0.2rem;
    }

    .links {
      margin-top: 0.7rem;
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      font-size: 0.98rem;
    }

    .links a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid var(--line);
      padding-bottom: 1px;
      transition: border-color 0.2s ease, color 0.2s ease;
    }

    .links a:hover {
      border-bottom-color: var(--fg);
    }

    .sep {
      color: var(--muted);
      user-select: none;
    }

    .note {
      margin-top: 1rem;
      font-size: 0.92rem;
      color: var(--muted);
    }

    @media (max-width: 640px) {
      .wrap {
        padding-top: 16vh;
      }

      h1 {
        font-size: 1.75rem;
      }

      .links {
        gap: 10px;
      }
    }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>

  <main class="wrap">
    <h1>Trey Li</h1>
    <p>The University of Manchester</p>
    <p class="field">Pure Mathematics</p>

    <div class="links">
      <a href="mailto:trey.li@manchester.ac.uk">trey.li@manchester.ac.uk</a>
      <span class="sep">•</span>
      <a href="https://scholar.google.com/" target="_blank" rel="noopener noreferrer">Scholar</a>
      <span class="sep">•</span>
      <a href="https://arxiv.org/" target="_blank" rel="noopener noreferrer">arXiv</a>
    </div>

    <p class="note">A small page with a moving background.</p>
  </main>

  <script>
    const canvas = document.getElementById("bg");
    const ctx = canvas.getContext("2d");

    let w = 0;
    let h = 0;
    let t = 0;

    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      w = window.innerWidth;
      h = window.innerHeight;
      canvas.width = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
      canvas.style.width = w + "px";
      canvas.style.height = h + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function draw() {
      t += 0.006;
      ctx.clearRect(0, 0, w, h);

      const lines = 3;
      for (let j = 0; j < lines; j++) {
        ctx.beginPath();
        const baseY = h * (0.70 + j * 0.08);
        for (let x = 0; x <= w; x += 4) {
          const y =
            baseY +
            18 * Math.sin(x * 0.008 + t + j * 0.9) +
            8 * Math.sin(x * 0.02 - t * 1.7 + j * 1.3);
          if (x === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.strokeStyle = j === 1 ? "rgba(0,0,0,0.12)" : "rgba(0,0,0,0.08)";
        ctx.lineWidth = 1;
        ctx.stroke();
      }

      requestAnimationFrame(draw);
    }

    window.addEventListener("resize", resize);
    resize();
    draw();
  </script>
</body>
</html>
